name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Override ESLint for CI compatibility
        working-directory: frontend
        run: npm install --no-save eslint@9.39.4

      - name: Run format check
        run: |
          make fmt
          git diff --exit-code

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Run build
        run: make build
