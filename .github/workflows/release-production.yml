name: Release Production

on:
  workflow_call:
    inputs:
      target_sha:
        description: Commit SHA to tag and release
        required: false
        type: string
      major:
        description: Override major version (X in vX.Y.Z)
        required: false
        type: string
      minor:
        description: Override minor version (Y in vX.Y.Z)
        required: false
        type: string
  workflow_dispatch:
    inputs:
      target_sha:
        description: Commit SHA to tag and release
        required: false
        type: string
      major:
        description: Override major version (X in vX.Y.Z)
        required: false
        type: string
      minor:
        description: Override minor version (Y in vX.Y.Z)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.meta.outputs.target_sha }}
      previous_tag: ${{ steps.meta.outputs.previous_tag }}
      previous_ref: ${{ steps.meta.outputs.previous_ref }}
      new_tag: ${{ steps.meta.outputs.new_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release version inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ inputs.major }}" ] && [ -n "${{ inputs.minor }}" ]; then
            echo "major と minor は同時に指定できません。" >&2
            exit 1
          fi

      - name: Determine release metadata
        id: meta
        run: |
          if [ -n "${{ inputs.target_sha }}" ]; then
            target_sha="${{ inputs.target_sha }}"
          else
            target_sha="${{ github.sha }}"
          fi

          previous_tag="$(git for-each-ref --sort=-version:refname --format='%(refname:short)' 'refs/tags/v*.*.*' | head -n1)"
          if [ -n "$previous_tag" ]; then
            previous_ref="$previous_tag"
          else
            previous_ref="$(git rev-list --max-parents=0 "$target_sha" | tail -n1)"
          fi

          if [ -n "$previous_tag" ]; then
            parsed="${previous_tag#v}"
            prev_major="${parsed%%.*}"
            remainder="${parsed#*.}"
            prev_minor="${remainder%%.*}"
            prev_patch="${remainder##*.}"
          else
            prev_major="0"
            prev_minor="0"
            prev_patch="0"
          fi

          major_input="${{ inputs.major }}"
          minor_input="${{ inputs.minor }}"

          if [ -n "$major_input" ]; then
            next_major="$major_input"
          else
            next_major="$prev_major"
          fi

          if [ -n "$minor_input" ]; then
            next_minor="$minor_input"
          else
            next_minor="$prev_minor"
          fi

          case "$next_major" in
            ''|*[!0-9]*)
              echo "major version must be numeric" >&2
              exit 1
              ;;
          esac

          case "$next_minor" in
            ''|*[!0-9]*)
              echo "minor version must be numeric" >&2
              exit 1
              ;;
          esac

          case "$prev_patch" in
            ''|*[!0-9]*)
              echo "previous patch version must be numeric" >&2
              exit 1
              ;;
          esac

          if [ -n "$major_input" ] && [ "$next_major" != "$prev_major" ]; then
            next_minor="0"
            next_patch="0"
          elif [ -n "$minor_input" ] && [ "$next_minor" != "$prev_minor" ]; then
            next_patch="0"
          else
            next_patch=$((prev_patch + 1))
          fi

          new_tag="v${next_major}.${next_minor}.${next_patch}"

          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "previous_ref=$previous_ref" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Create release tag and notes
        uses: actions/github-script@v8
        env:
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
          PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
          PREVIOUS_REF: ${{ needs.prepare.outputs.previous_ref }}
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = process.env.TARGET_SHA;
            const previousTag = process.env.PREVIOUS_TAG;
            const previousRef = process.env.PREVIOUS_REF;
            const newTag = process.env.NEW_TAG;

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${previousRef}...${targetSha}`,
            });

            const pullRequests = new Map();

            for (const commit of compare.data.commits) {
              const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: commit.sha,
              });

              for (const pr of associated.data) {
                if (pr.merged_at) {
                  pullRequests.set(pr.number, pr);
                }
              }
            }

            const sortedPullRequests = Array.from(pullRequests.values()).sort((a, b) => a.number - b.number);
            const compareLabel = previousTag
              ? `${previousTag}...${newTag}`
              : `${previousRef.slice(0, 7)}...${newTag}`;

            const lines = [
              `Production release for \`${targetSha.slice(0, 7)}\`.`,
              ``,
              previousTag
                ? `Changes since \`${previousTag}\`.`
                : `Initial production release from repository start.`,
              ``,
              `## Pull Requests`,
            ];

            if (sortedPullRequests.length === 0) {
              lines.push(`- No merged pull requests were associated with this release.`);
            } else {
              for (const pr of sortedPullRequests) {
                const author = pr.user?.login ? `@${pr.user.login}` : "unknown";
                lines.push(`- #${pr.number} ${pr.title} (${author})`);
              }
            }

            lines.push(
              ``,
              `## Compare`,
              `- https://github.com/${owner}/${repo}/compare/${compareLabel}`,
            );

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${newTag}`,
                sha: targetSha,
              });
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: newTag,
              target_commitish: targetSha,
              name: newTag,
              body: lines.join("\n"),
              generate_release_notes: false,
            });
