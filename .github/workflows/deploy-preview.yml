name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Validate Vercel preview app environment
        run: |
          if ! grep -q '^NEXT_PUBLIC_API_BASE_URL=' .vercel/.env.preview.local; then
            echo "NEXT_PUBLIC_API_BASE_URL is not configured in the Vercel Preview environment for this project." >&2
            exit 1
          fi

      - name: Build preview deployment
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          url=$(npx vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        run: |
          {
            echo "## Preview"
            echo
            echo "- Vercel URL: ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy preview to Railway
        run: |
          railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --service "${RAILWAY_SERVICE_NAME:-Fukunishifarm}" \
            --environment preview-v2 \
            --verbose \
            --ci

      - name: Write deployment summary
        run: |
          {
            echo "## Preview"
            echo
            echo "- Railway: preview backend deploy completed"
          } >> "$GITHUB_STEP_SUMMARY"
