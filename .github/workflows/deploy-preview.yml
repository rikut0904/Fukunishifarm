name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  vercel-preview:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Pull Vercel preview environment
        working-directory: frontend
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build preview deployment
        working-directory: frontend
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview to Vercel
        id: deploy
        working-directory: frontend
        run: |
          url=$(npx vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        run: |
          {
            echo "## Preview"
            echo
            echo "- Vercel URL: ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  railway-preview:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: preview
    env:
      RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_PREVIEW_DEPLOY_HOOK_URL }}

    steps:
      - name: Validate Railway preview hook
        run: test -n "$RAILWAY_DEPLOY_HOOK_URL"

      - name: Trigger Railway preview deployment
        run: curl --fail --silent --show-error --location --request POST "$RAILWAY_DEPLOY_HOOK_URL"

      - name: Write deployment summary
        run: |
          {
            echo "## Preview"
            echo
            echo "- Railway: preview deploy hook triggered"
          } >> "$GITHUB_STEP_SUMMARY"
