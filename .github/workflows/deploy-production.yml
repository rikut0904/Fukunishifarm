name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      major:
        description: Release major version override (X in vX.Y.Z)
        required: false
        type: string
      minor:
        description: Release minor version override (Y in vX.Y.Z)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest

    steps:
      - name: Validate release version inputs
        run: |
          if [ -n "${{ inputs.major }}" ] && [ -n "${{ inputs.minor }}" ]; then
            echo "major と minor は同時に指定できません。" >&2
            exit 1
          fi

  railway-production:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate Railway secrets
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy production to Railway
        run: |
          railway up backend \
            --project "$RAILWAY_PROJECT_ID" \
            --service "${RAILWAY_SERVICE_NAME:-Fukunishifarm}" \
            --environment production \
            --path-as-root \
            --verbose \
            --ci

      - name: Write deployment summary
        run: |
          {
            echo "## Production"
            echo
            echo "- Railway: production backend deploy completed"
          } >> "$GITHUB_STEP_SUMMARY"

  cloudflare-production:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CF_NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_SITE_BASE_URL: ${{ secrets.CF_NEXT_PUBLIC_SITE_BASE_URL }}
      API_INTERNAL_BASE_URL: ${{ secrets.CF_API_INTERNAL_BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$NEXT_PUBLIC_API_BASE_URL"
          test -n "$NEXT_PUBLIC_SITE_BASE_URL"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Deploy production to Cloudflare
        working-directory: frontend
        run: npm run deploy

      - name: Write deployment summary
        run: |
          {
            echo "## Production"
            echo
            echo "- Cloudflare: production deploy completed"
          } >> "$GITHUB_STEP_SUMMARY"

  release-production:
    needs:
      - validate-release-inputs
      - railway-production
      - cloudflare-production
    uses: ./.github/workflows/release-production.yml
    with:
      target_sha: ${{ github.sha }}
      major: ${{ inputs.major }}
      minor: ${{ inputs.minor }}
