name: CI Fmt

on:
  pull_request:
    types:
      - synchronize

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Run gofmt
        run: make fmt

      - name: Verify formatting
        run: git diff --exit-code
